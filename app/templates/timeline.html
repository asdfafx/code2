{% extends "base.html" %}

{% block title %}行为时间线 - 日志分析系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">⏱️ 行为时间线</div>
    <div class="card-body">
        <div style="margin-bottom: 20px;">
            <input type="text" id="ipSearchInput" placeholder="输入 IP 地址查看时间线..." style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; min-width: 300px; margin-right: 10px;">
            <button class="btn btn-primary" onclick="searchIPTimeline()">🔍 搜索</button>
            <button class="btn btn-success" onclick="loadTopAttackers()">🏆 顶级攻击者</button>
            <button class="btn btn-danger" onclick="loadAttackChains()">⛓️ 攻击链路</button>
        </div>
        
        <!-- IP 时间线展示 -->
        <div id="ipTimelineSection" style="display: none;">
            <div class="card" style="margin-bottom: 20px;">
                <div class="card-header">
                    <span id="timelineIPTitle">IP 时间线</span>
                    <span style="float: right; font-size: 14px; color: #666;">
                        总请求: <span id="timelineTotalRequests">0</span> | 
                        攻击次数: <span id="timelineAttackCount">0</span> | 
                        攻击率: <span id="timelineAttackRate">0%</span>
                    </span>
                </div>
                <div class="card-body">
                    <div id="timelineVisualization" style="max-height: 600px; overflow-y: auto;">
                        <!-- 时间线将在这里动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 顶级攻击者列表 -->
        <div id="topAttackersSection" style="display: none;">
            <div class="card">
                <div class="card-header">🏆 顶级攻击者 TOP 10</div>
                <div class="card-body">
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>IP 地址</th>
                                <th>总请求</th>
                                <th>攻击次数</th>
                                <th>攻击率</th>
                                <th>活动时长</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="topAttackersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 攻击链路检测 -->
        <div id="attackChainsSection" style="display: none;">
            <div class="card">
                <div class="card-header">️ 攻击链路检测</div>
                <div class="card-body">
                    <div id="chainsList">
                        <p style="color: #999; text-align: center;">点击"攻击链路"按钮开始检测</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 行为模式分析 -->
        <div class="card" style="margin-top: 20px;">
            <div class="card-header">📊 行为模式分析</div>
            <div class="card-body">
                <div id="patternsList">
                    <p style="color: #999; text-align: center;">暂无模式分析数据</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 搜索 IP 时间线
    async function searchIPTimeline() {
        const ipAddress = document.getElementById('ipSearchInput').value.trim();
        if (!ipAddress) {
            showMessage('请输入 IP 地址', 'warning');
            return;
        }

        try {
            showMessage('正在加载时间线数据...', 'info');
            const response = await fetch(`${API_BASE}/timeline/ip/${ipAddress}`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('ipTimelineSection').style.display = 'block';
                document.getElementById('topAttackersSection').style.display = 'none';
                document.getElementById('attackChainsSection').style.display = 'none';
                
                document.getElementById('timelineIPTitle').textContent = `IP: ${ipAddress} 时间线`;
                document.getElementById('timelineTotalRequests').textContent = data.total_requests;
                document.getElementById('timelineAttackCount').textContent = data.attack_count;
                document.getElementById('timelineAttackRate').textContent = (data.attack_rate * 100).toFixed(2) + '%';

                // 显示时间线
                const timelineDiv = document.getElementById('timelineVisualization');
                timelineDiv.innerHTML = data.timeline.map(event => `
                    <div style="padding: 15px; margin-bottom: 10px; border-left: 4px solid ${event.is_attack ? '#f44336' : '#4caf50'}; background: #f9f9f9; border-radius: 5px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>${event.request}</strong>
                            <span style="color: #666; font-size: 12px;">${new Date(event.timestamp).toLocaleString()}</span>
                        </div>
                        <div style="font-size: 13px; color: #666;">
                            状态码: ${event.status_code} | 
                            风险等级: ${event.risk_level || '低'} | 
                            ${event.is_attack ? '<span style="color: #f44336;">⚠️ 攻击行为</span>' : '<span style="color: #4caf50;">✅ 正常请求</span>'}
                        </div>
                    </div>
                `).join('');

                showMessage('时间线加载完成', 'success');
            } else {
                showMessage('加载失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('加载时间线失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // 加载顶级攻击者
    async function loadTopAttackers() {
        try {
            showMessage('正在加载顶级攻击者...', 'info');
            const response = await fetch(`${API_BASE}/timeline/top-attackers?limit=10`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('ipTimelineSection').style.display = 'none';
                document.getElementById('topAttackersSection').style.display = 'block';
                document.getElementById('attackChainsSection').style.display = 'none';

                const tbody = document.getElementById('topAttackersList');
                tbody.innerHTML = data.attackers.map((a, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${a.ip_address}</td>
                        <td>${a.total_requests}</td>
                        <td>${a.attack_count}</td>
                        <td>${(a.attack_rate * 100).toFixed(2)}%</td>
                        <td>${a.duration || '未知'}</td>
                        <td>
                            <button class="btn btn-primary" onclick="document.getElementById('ipSearchInput').value='${a.ip_address}'; searchIPTimeline();" style="padding: 5px 10px; font-size: 12px;">查看时间线</button>
                        </td>
                    </tr>
                `).join('');

                showMessage('顶级攻击者加载完成', 'success');
            } else {
                showMessage('加载失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('加载顶级攻击者失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // 加载攻击链路
    async function loadAttackChains() {
        try {
            showMessage('正在检测攻击链路...', 'info');
            const response = await fetch(`${API_BASE}/timeline/attack-chains`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('ipTimelineSection').style.display = 'none';
                document.getElementById('topAttackersSection').style.display = 'none';
                document.getElementById('attackChainsSection').style.display = 'block';

                const chainsDiv = document.getElementById('chainsList');
                if (data.chains && data.chains.length > 0) {
                    chainsDiv.innerHTML = data.chains.map(chain => `
                        <div style="padding: 15px; margin-bottom: 15px; background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 5px;">
                            <h4 style="margin-bottom: 10px;">⛓️ 攻击链路 #${chain.chain_id}</h4>
                            <p><strong>IP 地址:</strong> ${chain.ip_address}</p>
                            <p><strong>攻击阶段:</strong> ${chain.stages.join(' → ')}</p>
                            <p><strong>时间跨度:</strong> ${chain.duration}</p>
                            <p><strong>严重程度:</strong> ${chain.severity}</p>
                        </div>
                    `).join('');
                } else {
                    chainsDiv.innerHTML = '<p style="color: #999; text-align: center;">未检测到攻击链路</p>';
                }

                showMessage('攻击链路检测完成', 'success');
            } else {
                showMessage('检测失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('检测攻击链路失败:', error);
            showMessage('检测失败', 'error');
        }
    }
</script>
{% endblock %}
