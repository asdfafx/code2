{% extends "base.html" %}

{% block title %}实时监控 - 日志分析系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📡 实时监控</div>
    <div class="card-body">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <button class="btn btn-primary" onclick="connectRealTime()" id="connectBtn">🔌 连接实时监控</button>
                <button class="btn btn-danger" onclick="disconnectRealTime()" id="disconnectBtn" style="display: none;">🔌 断开连接</button>
                <span id="connectionStatus" style="margin-left: 15px; color: #999;">未连接</span>
            </div>
            <div>
                <span style="color: #666; font-size: 14px;">最近日志数: <span id="recentLogCount">0</span></span>
            </div>
        </div>
        
        <!-- 实时日志显示区域 -->
        <div class="card">
            <div class="card-header"> 实时日志流</div>
            <div class="card-body">
                <div id="realTimeLogContainer" style="max-height: 600px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 13px;">
                    <p style="color: #999; text-align: center;">点击"连接实时监控"开始接收日志</p>
                </div>
            </div>
        </div>
        
        <!-- 监控统计 -->
        <div class="stats-grid" style="margin-top: 20px;">
            <div class="stat-card">
                <div class="stat-number" id="rtConnectedClients">0</div>
                <div class="stat-label">连接客户端</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rtBufferSize">0</div>
                <div class="stat-label">缓冲区大小</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rtIsRunning">否</div>
                <div class="stat-label">监控状态</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    let socket = null;
    let isConnected = false;

    // 连接实时监控
    function connectRealTime() {
        try {
            socket = io();
            
            socket.on('connect', function() {
                isConnected = true;
                document.getElementById('connectionStatus').textContent = '已连接';
                document.getElementById('connectionStatus').style.color = '#4caf50';
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
                document.getElementById('rtIsRunning').textContent = '是';
                document.getElementById('realTimeLogContainer').innerHTML = '<p style="color: #4caf50; text-align: center;">✅ 已连接到实时监控服务</p>';
                showMessage('已连接到实时监控', 'success');
                
                // 获取初始统计数据
                socket.emit('get_stats');
            });

            socket.on('log_entry', function(data) {
                const container = document.getElementById('realTimeLogContainer');
                const logEntry = document.createElement('div');
                logEntry.style.cssText = 'padding: 8px; margin-bottom: 5px; border-left: 3px solid #667eea; background: white; border-radius: 3px;';
                logEntry.innerHTML = `
                    <div style="font-size: 12px; color: #666;">${new Date().toLocaleString()}</div>
                    <div><strong>${data.ip_address}</strong> - ${data.request}</div>
                    <div style="font-size: 12px; color: #999;">风险分: ${data.risk_score}</div>
                `;
                container.insertBefore(logEntry, container.firstChild);
                
                // 保持最多100条记录
                while (container.children.length > 100) {
                    container.removeChild(container.lastChild);
                }
                
                document.getElementById('recentLogCount').textContent = container.children.length;
            });

            socket.on('stats_update', function(data) {
                document.getElementById('rtConnectedClients').textContent = data.connected_clients || 0;
                document.getElementById('rtBufferSize').textContent = data.buffer_size || 0;
            });

            socket.on('disconnect', function() {
                isConnected = false;
                document.getElementById('connectionStatus').textContent = '已断开';
                document.getElementById('connectionStatus').style.color = '#f44336';
                document.getElementById('connectBtn').style.display = 'inline-block';
                document.getElementById('disconnectBtn').style.display = 'none';
                document.getElementById('rtIsRunning').textContent = '否';
                showMessage('与实时监控服务断开连接', 'warning');
            });

        } catch (error) {
            console.error('连接失败:', error);
            showMessage('连接失败', 'error');
        }
    }

    // 断开连接
    function disconnectRealTime() {
        if (socket) {
            socket.disconnect();
            socket = null;
        }
        isConnected = false;
        document.getElementById('connectionStatus').textContent = '未连接';
        document.getElementById('connectionStatus').style.color = '#999';
        document.getElementById('connectBtn').style.display = 'inline-block';
        document.getElementById('disconnectBtn').style.display = 'none';
        document.getElementById('rtIsRunning').textContent = '否';
    }

    // 页面卸载时断开连接
    window.addEventListener('beforeunload', function() {
        if (socket) {
            socket.disconnect();
        }
    });
</script>
{% endblock %}
