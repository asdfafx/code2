{% extends "base.html" %}

{% block title %}地理分析 - 日志分析系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header"> 地理分析</div>
    <div class="card-body">
        <div style="margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="loadGeoStats()">🔄 刷新数据</button>
            <span style="margin-left: 15px; color: #666;">IP 地理位置分析与异常检测</span>
        </div>
        
        <!-- 地理位置统计 -->
        <div class="stats-grid" id="geoStats" style="margin-bottom: 20px;">
            <div class="stat-card">
                <div class="stat-number" id="totalIPs">0</div>
                <div class="stat-label">独立 IP 数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCountries">0</div>
                <div class="stat-label">涉及国家/地区</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="attackRate">0%</div>
                <div class="stat-label">平均攻击率</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="anomalyCount">0</div>
                <div class="stat-label">异常地区告警</div>
            </div>
        </div>
        
        <!-- 地图可视化 -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="card-header">️ 攻击来源地图分布</div>
            <div class="card-body">
                <div id="mapContainer" style="height: 400px; background: #f9f9f9; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #999;">
                    <p>点击"刷新数据"加载地图</p>
                </div>
            </div>
        </div>
        
        <!-- 国家/地区分布 -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="card-header">🌍 国家/地区分布</div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr>
                            <th>国家/地区</th>
                            <th>IP 数量</th>
                            <th>请求次数</th>
                            <th>攻击次数</th>
                            <th>攻击率</th>
                        </tr>
                    </thead>
                    <tbody id="countryDistribution"></tbody>
                </table>
            </div>
        </div>
        
        <!-- 异常地区告警 -->
        <div class="card">
            <div class="card-header">️ 异常地区告警</div>
            <div class="card-body">
                <div id="anomaliesList">
                    <p style="color: #999; text-align: center;">暂无异常告警</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 加载地理统计
    async function loadGeoStats() {
        try {
            showMessage('正在加载地理数据...', 'info');
            const response = await fetch(`${API_BASE}/geo/stats`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('totalIPs').textContent = data.total_ips;
                document.getElementById('totalCountries').textContent = data.total_countries;
                document.getElementById('attackRate').textContent = (data.attack_rate * 100).toFixed(2) + '%';
                document.getElementById('anomalyCount').textContent = data.anomaly_count;

                // 显示国家分布
                const tbody = document.getElementById('countryDistribution');
                tbody.innerHTML = data.countries.map(c => `
                    <tr>
                        <td>${c.country}</td>
                        <td>${c.ip_count}</td>
                        <td>${c.request_count}</td>
                        <td>${c.attack_count}</td>
                        <td>${(c.attack_rate * 100).toFixed(2)}%</td>
                    </tr>
                `).join('');

                // 显示异常告警
                const anomaliesDiv = document.getElementById('anomaliesList');
                if (data.anomalies && data.anomalies.length > 0) {
                    anomaliesDiv.innerHTML = data.anomalies.map(a => `
                        <div style="padding: 10px; margin-bottom: 10px; background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 5px;">
                            <strong>⚠️ ${a.country}</strong>: ${a.reason}
                        </div>
                    `).join('');
                } else {
                    anomaliesDiv.innerHTML = '<p style="color: #999; text-align: center;">暂无异常告警</p>';
                }

                // 更新地图（简化版本）
                document.getElementById('mapContainer').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <h3>🗺️ 地图可视化</h3>
                        <p>数据来源: ${data.total_countries} 个国家/地区</p>
                        <p style="color: #666; font-size: 14px;">(可集成 ECharts 或 Leaflet 进行完整地图展示)</p>
                    </div>
                `;

                showMessage('地理数据加载完成', 'success');
            } else {
                showMessage('加载失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('加载地理数据失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadGeoStats();
    });
</script>
{% endblock %}
