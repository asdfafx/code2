<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - 日志分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: 60px; }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .header h1 { font-size: 20px; white-space: nowrap; }
        .nav-menu { display: flex; gap: 0; height: 60px; align-items: stretch; }
        .nav-menu a { 
            color: white; 
            text-decoration: none; 
            padding: 0 18px; 
            display: flex;
            align-items: center;
            transition: all 0.3s;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            height: 100%;
        }
        .nav-menu a:hover { background: rgba(255,255,255,0.15); }
        .nav-menu a.active { 
            background: rgba(255,255,255,0.2); 
            font-weight: bold;
            border-bottom-color: white;
        }
        .user-info { display: flex; align-items: center; gap: 15px; white-space: nowrap; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .stat-label { color: #666; font-size: 14px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { padding: 20px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; }
        .card-body { padding: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-success { background: #4caf50; color: white; }
        .btn-danger { background: #f44336; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; font-weight: bold; }
        tr:hover { background: #f5f5f5; }
        .risk-high { color: #f44336; font-weight: bold; }
        .risk-medium { color: #ff9800; }
        .risk-low { color: #4caf50; }
        .upload-area { border: 2px dashed #ddd; padding: 30px; text-align: center; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #667eea; background: #f5f6ff; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { border-bottom-color: #667eea; color: #667eea; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; font-size: 13px; resize: vertical; min-height: 200px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .badge { display: inline-block; padding: 3px 8px; background: #667eea; color: white; border-radius: 3px; font-size: 12px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 10px; width: 80%; max-width: 900px; max-height: 80vh; overflow-y: auto; }
        .close { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close:hover { color: #333; }
        .detail-section { margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
        .detail-section h3 { margin-bottom: 10px; color: #667eea; }
        .detail-row { margin: 8px 0; }
        .detail-label { font-weight: bold; color: #555; display: inline-block; min-width: 120px; }
        .detail-value { color: #333; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; }
        .pagination button { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 3px; }
        .pagination button.active { background: #667eea; color: white; border-color: #667eea; }
        .pagination button:hover:not(.active) { background: #f5f5f5; }
        .checkbox-col { width: 40px; text-align: center; }
        .search-box { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; min-width: 200px; }
        .progress-bar { width: 100%; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        canvas { max-width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📊 日志分析系统</h1>
            <nav class="nav-menu">
                <a href="/import" id="nav-import">🤖 LLM 日志分析</a>
                <a href="/operations" id="nav-operations">🛡️ 智能监控</a>
                <a href="/export" id="nav-export">📤 导出报告</a>
                <a href="/profile" id="nav-profile">👤 个人中心</a>
                <a href="/admin" id="nav-admin">⚙️ 系统管理</a>
            </nav>
        </div>
        <div class="user-info">
            <span>用户：<span id="currentUsername"></span></span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>
    
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalLogs">0</div>
                <div class="stat-label">总日志数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="analyzedLogs">0</div>
                <div class="stat-label">已分析</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="safeLogs">0</div>
                <div class="stat-label">安全日志</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="highRisk">0</div>
                <div class="stat-label">高风险</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="attackTypes">0</div>
                <div class="stat-label">攻击类型</div>
            </div>
        </div>
        
        <!-- 数据可视化图表 -->
        <div class="card">
            <div class="card-header">📊 数据分析</div>
            <div class="card-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
                    <div>
                        <h4 style="margin-bottom: 10px;">风险等级分布</h4>
                        <div class="chart-container">
                            <canvas id="riskChart"></canvas>
                        </div>
                    </div>
                    <div>
                        <h4 style="margin-bottom: 10px;">攻击类型分布</h4>
                        <div class="chart-container">
                            <canvas id="attackChart"></canvas>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px;">最近7天分析趋势</h4>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
                <!-- 个人中心 -->
                <div id="profileTab" class="tab-content">
                    <div style="max-width: 600px;">
                        <h3 style="margin-bottom: 20px;">修改个人信息</h3>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: bold;">用户名</label>
                            <input type="text" id="profileUsername" disabled style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #f5f5f5;">
                        </div>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: bold;">邮箱</label>
                            <input type="email" id="profileEmail" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        </div>
                        <button class="btn btn-primary" onclick="updateProfile()" style="margin-right: 10px;">保存修改</button>

                        <hr style="margin: 30px 0;">

                        <h3 style="margin-bottom: 20px;">修改密码</h3>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: bold;">原密码</label>
                            <input type="password" id="oldPassword" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: bold;">新密码</label>
                            <input type="password" id="newPassword" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: bold;">确认新密码</label>
                            <input type="password" id="confirmPassword" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        </div>
                        <button class="btn btn-success" onclick="changePassword()">修改密码</button>
                    </div>
                </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let currentPage = 1;
        let totalPages = 1;
        let selectedEntries = new Set();
        let riskChartInstance = null;
        let attackChartInstance = null;
        let trendChartInstance = null;
        let socket = null;
        let isRealTimeConnected = false;
        
        // 页面加载时检查登录状态
        window.onload = async function() {
            await checkAuth();
            highlightCurrentNav();  // 高亮当前页面导航
            loadStatistics();
            loadImports();
            loadCharts();
        };
        
        // 检查认证
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/auth/current`);
                if (!response.ok) {
                    window.location.href = '/';
                    return;
                }
                const data = await response.json();
                currentUser = data.user;
                document.getElementById('currentUsername').textContent = currentUser.username;
                
                // 如果是管理员，显示管理标签
                if (currentUser.role != 'admin') {
                    document.getElementById('nav-admin').style.display = 'none';
                }
                
                // 填充个人信息
                document.getElementById('profileUsername').value = currentUser.username;
                document.getElementById('profileEmail').value = currentUser.email || '';
            } catch (error) {
                window.location.href = '/';
            }
        }
        
        // 高亮当前页面导航
        function highlightCurrentNav() {
            const currentPath = window.location.pathname;
            const navId = 'nav-' + currentPath.substring(1);
            const navElement = document.getElementById(navId);
            if (navElement) {
                navElement.classList.add('active');
            }
        }
        
        // 登出
        async function logout() {
            await fetch(`${API_BASE}/auth/logout`, { method: 'POST' });
            localStorage.removeItem('user');
            window.location.href = '/';
        }
        
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
            
            if (tabName === 'analyze') {
                loadResults();
                // 显示提示信息
                showMLHint();
            } else if (tabName === 'geo') {
                loadGeoStats();
            } else if (tabName === 'timeline') {
                loadTopAttackers();
            } else if (tabName === 'admin') {
                loadAdminData();
            }
        }
        
        // 显示 ML 检测提示
        function showMLHint() {
            const emptyState = document.getElementById('mlEmptyState');
            if (emptyState && emptyState.style.display !== 'none') {
                // 如果还没有执行过检测，显示友好提示
                setTimeout(() => {
                    if (emptyState.style.display !== 'none') {
                        emptyState.style.background = '#fff9e6';
                        emptyState.style.borderRadius = '8px';
                        emptyState.style.padding = '20px';
                    }
                }, 500);
            }
        }
        
        // 切换管理员子标签
        function switchAdminTab(subTab) {
            document.querySelectorAll('#adminTab .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('adminUsersTab').style.display = subTab === 'users' ? 'block' : 'none';
            document.getElementById('adminModelsTab').style.display = subTab === 'models' ? 'block' : 'none';
            document.getElementById('adminAlertsTab').style.display = subTab === 'alerts' ? 'block' : 'none';
            document.getElementById('adminSystemTab').style.display = subTab === 'system' ? 'block' : 'none';
            
            if (subTab === 'users') loadUsers();
            if (subTab === 'models') loadModels();
            if (subTab === 'alerts') loadAlertConfig();
            if (subTab === 'system') loadSystemStats();
        }
        
        // 加载统计
        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/analysis/stats`);
                const data = await response.json();
                
                document.getElementById('totalLogs').textContent = data.total_logs || 0;
                document.getElementById('analyzedLogs').textContent = data.analyzed_logs || 0;
                
                // 计算安全日志数（正常 + 低风险）
                const normalCount = data.risk_distribution?.normal || data.risk_distribution?.['正常'] || 0;
                const lowCount = data.risk_distribution?.low || data.risk_distribution?.['低风险'] || 0;
                const safeLogs = normalCount + lowCount;
                document.getElementById('safeLogs').textContent = safeLogs;
                
                // 高风险数
                const highRisk = data.risk_distribution?.high || data.risk_distribution?.['高风险'] || 0;
                document.getElementById('highRisk').textContent = highRisk;
                
                // 攻击类型数（过滤掉无效值）
                const attackTypes = Object.keys(data.attack_distribution || {}).filter(
                    key => key && key !== '无' && key !== 'none' && key !== 'None'
                ).length;
                document.getElementById('attackTypes').textContent = attackTypes;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 加载图表
        async function loadCharts() {
            try {
                const response = await fetch(`${API_BASE}/analysis/stats`);
                const data = await response.json();
                
                // 风险等级分布图
                const riskCtx = document.getElementById('riskChart').getContext('2d');
                if (riskChartInstance) riskChartInstance.destroy();
                
                // 支持中文和英文键名
                const highCount = data.risk_distribution?.high || data.risk_distribution?.['高风险'] || 0;
                const mediumCount = data.risk_distribution?.medium || data.risk_distribution?.['中风险'] || 0;
                const lowCount = data.risk_distribution?.low || data.risk_distribution?.['低风险'] || 0;
                const normalCount = data.risk_distribution?.normal || data.risk_distribution?.['正常'] || 0;
                
                riskChartInstance = new Chart(riskCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['高风险', '中风险', '低风险', '正常'],
                        datasets: [{
                            data: [highCount, mediumCount, lowCount, normalCount],
                            backgroundColor: ['#f44336', '#ff9800', '#ffc107', '#4caf50']
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    filter: function(legendItem) {
                                        // 过滤掉数据为0的项
                                        return legendItem.text !== '正常' || legendItem.text === '正常';
                                    }
                                }
                            }
                        }
                    }
                });
                
                // 攻击类型分布图
                const attackCtx = document.getElementById('attackChart').getContext('2d');
                const attackLabels = Object.keys(data.attack_distribution || {});
                const attackData = Object.values(data.attack_distribution || {});
                if (attackChartInstance) attackChartInstance.destroy();
                attackChartInstance = new Chart(attackCtx, {
                    type: 'bar',
                    data: {
                        labels: attackLabels.length > 0 ? attackLabels : ['无数据'],
                        datasets: [{
                            label: '数量',
                            data: attackData.length > 0 ? attackData : [0],
                            backgroundColor: '#667eea'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                
                // 趋势图
                const trendCtx = document.getElementById('trendChart').getContext('2d');
                const trendLabels = data.trend?.map(t => t.date) || [];
                const trendData = data.trend?.map(t => t.count) || [];
                
                // 检查是否所有数据都是0
                const allZero = trendData.length > 0 && trendData.every(v => v === 0);
                
                if (trendChartInstance) trendChartInstance.destroy();
                trendChartInstance = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: trendLabels.length > 0 ? trendLabels : ['无数据'],
                        datasets: [{
                            label: '分析数量',
                            data: trendData.length > 0 ? trendData : [0],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true
                            },
                            title: {
                                display: allZero,
                                text: '最近7天无分析数据',
                                color: '#999',
                                font: {
                                    size: 14
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('加载图表失败:', error);
            }
        }
        
        // 加载导入记录
        async function loadImports() {
            try {
                const response = await fetch(`${API_BASE}/logs/list`);
                const data = await response.json();
                
                const tbody = document.getElementById('importList');
                tbody.innerHTML = '';
                
                data.imports.forEach(imp => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${imp.filename}</td>
                        <td>${imp.log_format}</td>
                        <td>${imp.parsed_lines}/${imp.total_lines}</td>
                        <td>${new Date(imp.import_time).toLocaleString()}</td>
                        <td><span class="badge">${imp.status}</span></td>
                        <td>
                            <button class="btn btn-primary" onclick="viewImport(${imp.import_id})">查看</button>
                            <button class="btn btn-success" onclick="streamAnalyzeImport(${imp.import_id}, '${imp.filename}')">⚡ 流式分析</button>
                            <button class="btn btn-danger" onclick="deleteImport(${imp.import_id})">删除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('加载导入记录失败:', error);
            }
        }
   
       
    </script>
</body>
</html>
