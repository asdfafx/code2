{% extends "base.html" %}

{% block title %}系统管理 - 日志分析系统{% endblock %}

{% block content %}
<!-- 系统统计概览 -->
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px;">
    <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="stat-number" id="sysTotalUsers" style="color: white;">0</div>
                <div class="stat-label" style="color: rgba(255,255,255,0.8);">总用户数</div>
            </div>
            <div style="font-size: 36px; opacity: 0.3;">👥</div>
        </div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="stat-number" id="sysTotalLogs" style="color: white;">0</div>
                <div class="stat-label" style="color: rgba(255,255,255,0.8);">总日志数</div>
            </div>
            <div style="font-size: 36px; opacity: 0.3;">📋</div>
        </div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="stat-number" id="sysTotalAnalyses" style="color: white;">0</div>
                <div class="stat-label" style="color: rgba(255,255,255,0.8);">总分析次数</div>
            </div>
            <div style="font-size: 36px; opacity: 0.3;">🔍</div>
        </div>
    </div>
    <!-- 存储使用卡片 - 已隐藏 -->
    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="stat-number" id="sysStorageUsed" style="color: white;">0 MB</div>
                <div class="stat-label" style="color: rgba(255,255,255,0.8);">存储使用</div>
            </div>
            <div style="font-size: 36px; opacity: 0.3;">💾</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <span>👥 用户管理</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="userSearch" placeholder="搜索用户名/邮箱..." style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 200px;" onkeyup="filterUsers()">
            <select id="roleFilter" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px;" onchange="filterUsers()">
                <option value="">所有角色</option>
                <option value="admin">管理员</option>
                <option value="user">普通用户</option>
            </select>
        </div>
    </div>
    <div class="card-body">
        <table>
            <thead>
                <tr>
                    <!-- 隐藏多选框列 -->
                    <th style="width: 60px; display: none;">ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>注册时间</th>
                    <th>最近登录</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="usersList"></tbody>
        </table>
        
        <!-- 分页 -->
        <div id="usersPagination" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee;">
            <div style="color: #666; font-size: 14px;">
                共 <span id="totalUsers">0</span> 个用户，当前第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页
            </div>
            <div style="display: flex; gap: 5px;" id="paginationButtons"></div>
        </div>
    </div>
</div>

<!-- 批量操作栏 - 已隐藏 -->
<div id="batchActions" style="display: none;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <span>已选择 <strong id="selectedCount">0</strong> 个用户</span>
        <button class="btn btn-danger" onclick="batchDeleteUsers()" style="padding: 8px 15px;">批量删除</button>
        <button class="btn" onclick="clearSelection()" style="background: #666; color: white; padding: 8px 15px;">取消选择</button>
    </div>
</div>

<!-- 用户详情弹窗 -->
<div id="userDetailModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">👤 用户详情</h2>
            <span class="close" onclick="closeUserDetailModal()">&times;</span>
        </div>
        <div id="userDetailContent"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allUsers = [];
    let filteredUsers = [];
    let currentPage = 1;
    const pageSize = 10;
    let selectedUsers = new Set();

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadAllData();
    });

    // 加载所有数据
    async function loadAllData() {
        await Promise.all([
            loadSystemStats(),
            loadUsers()
        ]);
    }

    // 加载系统统计
    async function loadSystemStats() {
        try {
            const response = await fetch(`${API_BASE}/admin/stats`);
            const data = await response.json();

            document.getElementById('sysTotalUsers').textContent = data.total_users || 0;
            // 兼容两种字段名：total_logs 或 total_log_entries
            document.getElementById('sysTotalLogs').textContent = data.total_logs || data.total_log_entries || 0;
            document.getElementById('sysTotalAnalyses').textContent = data.total_analyses || 0;
            // 存储使用卡片已隐藏，不再更新
            // document.getElementById('sysStorageUsed').textContent = data.storage_used || '0 MB';
        } catch (error) {
            console.error('加载系统统计失败:', error);
        }
    }

    // 加载用户列表
    async function loadUsers() {
        try {
            const response = await fetch(`${API_BASE}/admin/users`);
            const data = await response.json();
            
            allUsers = data.users || [];
            filterUsers();
        } catch (error) {
            console.error('加载用户列表失败:', error);
            showMessage('加载用户列表失败', 'error');
        }
    }

    // 筛选用户
    function filterUsers() {
        const searchText = document.getElementById('userSearch').value.toLowerCase();
        const roleFilter = document.getElementById('roleFilter').value;

        filteredUsers = allUsers.filter(user => {
            const matchSearch = !searchText ||
                user.username.toLowerCase().includes(searchText) ||
                (user.email && user.email.toLowerCase().includes(searchText));
            const matchRole = !roleFilter || user.role === roleFilter;
            return matchSearch && matchRole;
        });

        currentPage = 1;
        renderUsersTable();
    }

    // 渲染用户表格
    function renderUsersTable() {
        const tbody = document.getElementById('usersList');
        const totalPages = Math.ceil(filteredUsers.length / pageSize) || 1;
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageUsers = filteredUsers.slice(start, end);

        tbody.innerHTML = pageUsers.map(user => `
            <tr>
                <!-- 隐藏多选框 -->
                <td style="display: none;">${user.user_id}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px;">
                            ${user.username.charAt(0).toUpperCase()}
                        </div>
                        <strong>${user.username}</strong>
                    </div>
                </td>
                <td>${user.email || '<span style="color:#999">未设置</span>'}</td>
                <td>
                    <span class="badge" style="background: ${user.role === 'admin' ? '#667eea' : '#4caf50'}; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px;">
                        ${user.role === 'admin' ? '管理员' : '普通用户'}
                    </span>
                </td>
                <td>${formatDate(user.created_at)}</td>
                <td>${user.last_login ? formatDate(user.last_login) : '<span style="color:#999">从未</span>'}</td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn btn-primary" onclick="showUserDetail(${user.user_id})" style="padding: 5px 10px; font-size: 12px;">详情</button>
                        <button class="btn btn-danger" onclick="deleteUser(${user.user_id})" style="padding: 5px 10px; font-size: 12px;">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');

        // 更新分页信息
        document.getElementById('totalUsers').textContent = filteredUsers.length;
        document.getElementById('currentPage').textContent = currentPage;
        document.getElementById('totalPages').textContent = totalPages;
        renderPagination(totalPages);
    }

    // 渲染分页按钮
    function renderPagination(totalPages) {
        const container = document.getElementById('paginationButtons');
        let html = '';

        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        // 上一页
        html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} 
            style="padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; ${currentPage === 1 ? 'opacity: 0.5;' : ''}">&laquo;</button>`;

        // 页码
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<button onclick="goToPage(${i})" 
                    style="padding: 8px 12px; border: 1px solid ${i === currentPage ? '#667eea' : '#ddd'}; background: ${i === currentPage ? '#667eea' : 'white'}; color: ${i === currentPage ? 'white' : '#333'}; cursor: pointer; border-radius: 5px;">${i}</button>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += `<span style="padding: 8px;">...</span>`;
            }
        }

        // 下一页
        html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} 
            style="padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; ${currentPage === totalPages ? 'opacity: 0.5;' : ''}">&raquo;</button>`;

        container.innerHTML = html;
    }

    // 跳转到指定页
    function goToPage(page) {
        const totalPages = Math.ceil(filteredUsers.length / pageSize) || 1;
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            renderUsersTable();
        }
    }

    // 切换用户选中状态
    function toggleUserSelection(userId) {
        if (selectedUsers.has(userId)) {
            selectedUsers.delete(userId);
        } else {
            selectedUsers.add(userId);
        }
        updateBatchActions();
        renderUsersTable();
    }

    // 全选/取消全选
    function toggleSelectAllUsers() {
        const selectAll = document.getElementById('selectAllUsers').checked;
        if (selectAll) {
            filteredUsers.forEach(u => selectedUsers.add(u.user_id));
        } else {
            selectedUsers.clear();
        }
        updateBatchActions();
        renderUsersTable();
    }

    // 更新批量操作栏
    function updateBatchActions() {
        const batchActions = document.getElementById('batchActions');
        const selectedCount = document.getElementById('selectedCount');
        
        if (selectedUsers.size > 0) {
            batchActions.style.display = 'block';
            selectedCount.textContent = selectedUsers.size;
        } else {
            batchActions.style.display = 'none';
        }
    }

    // 清除选择
    function clearSelection() {
        selectedUsers.clear();
        updateBatchActions();
        renderUsersTable();
    }

    // 批量删除用户
    async function batchDeleteUsers() {
        if (!confirm(`确定要删除选中的 ${selectedUsers.size} 个用户及其所有相关数据吗？此操作不可撤销。`)) return;

        for (const userId of selectedUsers) {
            try {
                await fetch(`${API_BASE}/admin/users/${userId}`, { method: 'DELETE' });
                allUsers = allUsers.filter(u => u.user_id !== userId);
            } catch (error) {
                console.error('删除用户失败:', userId, error);
            }
        }
        showMessage(`已删除 ${selectedUsers.size} 个用户`, 'success');
        clearSelection();
        filterUsers();
    }

    // 删除用户
    async function deleteUser(userId) {
        if (!confirm('确定要删除该用户及其所有相关数据吗？此操作不可撤销。')) return;

        try {
            const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                method: 'DELETE'
            });
            const data = await response.json();

            if (data.message) {
                allUsers = allUsers.filter(u => u.user_id !== userId);
                filterUsers();
                showMessage(data.message || '删除成功', 'success');
            } else {
                showMessage('删除失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (error) {
            console.error('删除失败:', error);
            showMessage('删除失败: ' + error.message, 'error');
        }
    }

    // 显示用户详情
    function showUserDetail(userId) {
        const user = allUsers.find(u => u.user_id === userId);
        if (!user) return;

        document.getElementById('userDetailContent').innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 32px; margin: 0 auto;">
                    ${user.username.charAt(0).toUpperCase()}
                </div>
                <h3 style="margin: 15px 0 5px;">${user.username}</h3>
                <span class="badge" style="background: ${user.role === 'admin' ? '#667eea' : '#4caf50'}; color: white; padding: 4px 15px; border-radius: 12px;">
                    ${user.role === 'admin' ? '管理员' : '普通用户'}
                </span>
            </div>
            
            <div style="background: #f9f9f9; border-radius: 10px; padding: 20px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <div style="color: #999; font-size: 12px; margin-bottom: 3px;">用户ID</div>
                        <div style="font-weight: 500;">#${user.user_id}</div>
                    </div>
                    <div>
                        <div style="color: #999; font-size: 12px; margin-bottom: 3px;">邮箱</div>
                        <div style="font-weight: 500;">${user.email || '未设置'}</div>
                    </div>
                    <div>
                        <div style="color: #999; font-size: 12px; margin-bottom: 3px;">注册时间</div>
                        <div style="font-weight: 500;">${formatDate(user.created_at)}</div>
                    </div>
                    <div>
                        <div style="color: #999; font-size: 12px; margin-bottom: 3px;">最近登录</div>
                        <div style="font-weight: 500;">${user.last_login ? formatDate(user.last_login) : '从未登录'}</div>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-danger" onclick="closeUserDetailModal(); deleteUser(${user.user_id});" style="flex: 1;">删除账号</button>
                <button class="btn" onclick="closeUserDetailModal()" style="flex: 1; background: #666; color: white;">
                    关闭
                </button>
            </div>
        `;
        
        document.getElementById('userDetailModal').style.display = 'block';
    }

    // 关闭用户详情弹窗
    function closeUserDetailModal() {
        document.getElementById('userDetailModal').style.display = 'none';
    }

    // 格式化日期
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // 点击弹窗外部关闭
    window.onclick = function(event) {
        const modal = document.getElementById('userDetailModal');
        if (event.target === modal) {
            closeUserDetailModal();
        }
    }
</script>
{% endblock %}
