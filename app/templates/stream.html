{% extends "base.html" %}

{% block title %}流式分析 - 日志分析系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header"> 流式分析</div>
    <div class="card-body">
        <div style="margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="loadStreamStats()">🔄 刷新统计</button>
            <button class="btn btn-success" onclick="showStreamAnalyzeModal()">⚡ 流式分析</button>
            <span style="margin-left: 15px; color: #666;">实时风险评分与动态阈值调整</span>
        </div>
        
        <!-- 流式分析统计 -->
        <div class="stats-grid" id="streamStats" style="margin-bottom: 20px;">
            <div class="stat-card">
                <div class="stat-number" id="streamTotalAnalyzed">0</div>
                <div class="stat-label">已分析条目</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="streamAnomalyCount">0</div>
                <div class="stat-label">异常数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="streamAnomalyRate">0%</div>
                <div class="stat-label">异常率</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="streamAvgRisk">0</div>
                <div class="stat-label">平均风险分</div>
            </div>
        </div>
        
        <!-- 阈值配置 -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="card-header">⚙️ 阈值配置</div>
            <div class="card-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="display: block; margin-bottom: 5px;">低风险阈值</label>
                        <input type="number" id="thresholdLow" value="20" min="0" max="100" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px;">中风险阈值</label>
                        <input type="number" id="thresholdMedium" value="40" min="0" max="100" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px;">高风险阈值</label>
                        <input type="number" id="thresholdHigh" value="60" min="0" max="100" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: inline-flex; align-items: center;">
                        <input type="checkbox" id="dynamicThresholdEnabled" checked style="margin-right: 8px;">
                        启用动态阈值调整
                    </label>
                </div>
                <button class="btn btn-primary" onclick="updateStreamThresholds()">💾 保存阈值</button>
                <button class="btn btn-warning" onclick="resetBaseline()" style="margin-left: 10px;">🔄 重置基线</button>
            </div>
        </div>
        
        <!-- 最近分析结果 -->
        <div class="card">
            <div class="card-header"> 最近分析结果</div>
            <div class="card-body">
                <div id="streamRecentResults" style="max-height: 500px; overflow-y: auto;">
                    <p style="color: #999; text-align: center;">点击"刷新统计"加载数据</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 加载流式统计
    async function loadStreamStats() {
        try {
            showMessage('正在加载统计数据...', 'info');
            const response = await fetch(`${API_BASE}/stream/statistics`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('streamTotalAnalyzed').textContent = data.total_analyzed;
                document.getElementById('streamAnomalyCount').textContent = data.anomaly_count;
                document.getElementById('streamAnomalyRate').textContent = (data.anomaly_rate * 100).toFixed(2) + '%';
                document.getElementById('streamAvgRisk').textContent = data.avg_risk_score.toFixed(2);

                // 显示最近结果
                const resultsDiv = document.getElementById('streamRecentResults');
                if (data.recent_results && data.recent_results.length > 0) {
                    resultsDiv.innerHTML = data.recent_results.map(r => `
                        <div style="padding: 10px; border-bottom: 1px solid #eee;">
                            <strong>${r.ip_address}</strong> - ${r.request}
                            <br><span style="color: #666; font-size: 12px;">风险分: ${r.risk_score.toFixed(2)} | ${new Date(r.timestamp).toLocaleString()}</span>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = '<p style="color: #999; text-align: center;">暂无数据</p>';
                }

                showMessage('统计数据加载完成', 'success');
            } else {
                showMessage('加载失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('加载统计失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // 流式分析
    async function showStreamAnalyzeModal() {
        try {
            showMessage('开始流式分析...', 'info');
            const response = await fetch(`${API_BASE}/stream/analyze`, {
                method: 'POST'
            });

            const data = await response.json();
            if (data.success) {
                showMessage('流式分析完成！', 'success');
                loadStreamStats();
            } else {
                showMessage('分析失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('流式分析失败:', error);
            showMessage('分析失败', 'error');
        }
    }

    // 更新阈值
    async function updateStreamThresholds() {
        const thresholds = {
            low: parseInt(document.getElementById('thresholdLow').value),
            medium: parseInt(document.getElementById('thresholdMedium').value),
            high: parseInt(document.getElementById('thresholdHigh').value),
            dynamic_enabled: document.getElementById('dynamicThresholdEnabled').checked
        };

        try {
            const response = await fetch(`${API_BASE}/stream/thresholds`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(thresholds)
            });

            const data = await response.json();
            if (data.success) {
                showMessage('阈值更新成功', 'success');
            } else {
                showMessage('更新失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('更新阈值失败:', error);
            showMessage('更新失败', 'error');
        }
    }

    // 重置基线
    async function resetBaseline() {
        if (!confirm('确定要重置基线数据吗？')) return;

        try {
            const response = await fetch(`${API_BASE}/stream/baseline/reset`, {
                method: 'POST'
            });

            const data = await response.json();
            if (data.success) {
                showMessage('基线重置成功', 'success');
                loadStreamStats();
            } else {
                showMessage('重置失败: ' + data.error, 'error');
            }
        } catch (error) {
            console.error('重置基线失败:', error);
            showMessage('重置失败', 'error');
        }
    }

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadStreamStats();
    });
</script>
{% endblock %}
